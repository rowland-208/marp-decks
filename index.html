<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Decks</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: #f7f7fb;
      color: #2a2a3a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 4rem 1.5rem;
    }

    main {
      width: 100%;
      max-width: 720px;
    }

    header {
      margin-bottom: 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      height: 8rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #2e6b34;
      margin-bottom: 0.5rem;
    }

    h1 a {
      display: inline-block;
      background: linear-gradient(135deg, #2e6b34, #c4a632);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
      position: relative;
      transition: filter 0.4s;
    }

    h1 a::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: 2px;
      width: 100%;
      height: 3px;
      background: linear-gradient(135deg, #2e6b34, #c4a632);
      border-radius: 2px;
      transition: opacity 0.2s;
    }

    h1 a:hover {
      filter: drop-shadow(0 0 12px rgba(46, 107, 52, 0.6)) drop-shadow(0 0 30px rgba(196, 166, 50, 0.35));
    }

    .deck-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .deck-list a {
      display: block;
      padding: 1.5rem 1.75rem;
      background: #ffffff;
      border: 1px solid #e0e0ea;
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    }

    .deck-list a:hover {
      border-color: #2e6b34;
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(46, 107, 52, 0.12);
    }

    .deck-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 0.25rem;
    }

    .deck-subtitle {
      font-size: 0.85rem;
      color: #8888a0;
    }

    .arrow {
      float: right;
      color: #c0c0d0;
      font-size: 1.2rem;
      transition: color 0.2s, transform 0.2s;
    }

    .deck-list a:hover .arrow {
      color: #2e6b34;
      transform: translateX(3px);
    }
  </style>
</head>
<body>
  <main>
    <header>
      <img src="etc/logo.png" alt="Marp Decks logo" class="logo">
      <h1>Slides built with <a href="https://github.com/rowland-208/marp-decks">Marp-Decks</a></h1>
    </header>
    <ul class="deck-list">
      <li>
        <a href="decks/cfmg-ai-agents/cfmg-ai-agents.html">
          <span class="arrow">&rarr;</span>
          <div class="deck-title">Agentic AI with Claude Code and Open Claw</div>
          <div class="deck-subtitle">CFMG presentation</div>
        </a>
      </li>
      <li>
        <a href="decks/whale-communication/whale-communication.html">
          <span class="arrow">&rarr;</span>
          <div class="deck-title">Whale Communication</div>
          <div class="deck-subtitle">Songs, clicks, and echoes across the ocean</div>
        </a>
      </li>
      <li>
        <a href="decks/pythagorean-theorem/pythagorean-theorem.html">
          <span class="arrow">&rarr;</span>
          <div class="deck-title">The Pythagorean Theorem</div>
          <div class="deck-subtitle">Math fundamentals</div>
        </a>
      </li>
    </ul>
  </main>
</body>
</html>
